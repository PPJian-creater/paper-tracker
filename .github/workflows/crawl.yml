name: 每日爬取SSCI文献

on:
  # 每天 UTC 16:00 执行（北京时间 00:00）
  schedule:
    - cron: '0 16 * * *'
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: '爬取模式'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - initial

# 并发控制：防止同一工作流重叠执行（避免同时写 papers.json）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# 权限设置
permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Crossref 主爬（优先获取最新文献+作者机构）
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          DOW=$(date -u +%w)
          if [ "$DOW" = "0" ]; then
            echo "Crossref Weekly（14天动态窗口）"
            python scripts/supplement.py --days 14
          else
            echo "Crossref Daily（7天动态窗口）"
            python scripts/supplement.py --days 7
          fi
        elif [ "${{ github.event.inputs.mode }}" = "initial" ]; then
          echo "Crossref Initial（30天动态窗口）"
          python scripts/supplement.py --days 30
        elif [ "${{ github.event.inputs.mode }}" = "weekly" ]; then
          echo "Crossref Weekly（14天动态窗口）"
          python scripts/supplement.py --days 14
        else
          echo "Crossref Daily（7天动态窗口）"
          python scripts/supplement.py --days 7
        fi
      env:
        EMAIL: ${{ secrets.EMAIL }}
        S2_API_KEY: ${{ secrets.S2_API_KEY }}

    - name: OpenAlex 补充爬虫（补充摘要）
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          HOUR=$(date -u +%H)
          DOW=$(date -u +%w)
          if [ "$DOW" = "0" ]; then
            echo "运行 Weekly 全量扫描（14天）"
            python scripts/crawler.py --days 14
          else
            echo "运行 Daily 动态窗口"
            python scripts/crawler.py --days 7
          fi
        elif [ "${{ github.event.inputs.mode }}" = "initial" ]; then
          python scripts/crawler.py --days 120
        elif [ "${{ github.event.inputs.mode }}" = "weekly" ]; then
          echo "运行 Weekly 全量扫描（14天）"
          python scripts/crawler.py --days 14
        else
          echo "运行 Daily 动态窗口"
          python scripts/crawler.py --days 7
        fi
      env:
        EMAIL: ${{ secrets.EMAIL }}

    - name: 清理重复和超期文献
      run: python scripts/cleanup.py

    - name: 导出数据
      run: python scripts/export.py
      
    - name: 提交数据更新（强制覆盖防止仓库膨胀）
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        
        # 检查是否有变更需要提交
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        # 始终覆盖旧数据（Actions 自产数据，无需 force-with-lease 保护）
        if git commit --amend --no-edit; then
          echo "Amend success, force pushing..."
        else
          echo "Amend failed (possibly first commit), creating new commit..."
          git commit -m "update: data $(date +%Y-%m-%d)"
        fi
        git push --force
        
    - name: 上传构建产物
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./
        
  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
    - name: 部署到GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
