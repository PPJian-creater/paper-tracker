<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Atlas - 学术文献追踪系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
        }
        :root {
            --pa-color: #1e40af;
            --pp-color: #0369a1;
            --pol-color: #4f46e5;
            --china-color: #0891b2;
            --accent-blue: #3b82f6;
        }
        .navbar {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 50%, #172554 100%);
            border-bottom: 3px solid #3b82f6;
            box-shadow: 0 4px 20px rgba(30, 64, 175, 0.25);
        }
        .nav-item {
            position: relative;
            padding: 0.5rem 1rem;
            color: #bfdbfe;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
            border-radius: 8px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .nav-item:hover { 
            color: #fff; 
            background: rgba(59, 130, 246, 0.25);
        }
        .nav-item.active { 
            color: #fff; 
            background: rgba(59, 130, 246, 0.35);
        }
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 3px;
            background: #60a5fa;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(96, 165, 250, 0.6);
        }
        .paper-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .paper-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            transition: width 0.3s ease;
        }
        .paper-card.pa::before { background: var(--pa-color); }
        .paper-card.pp::before { background: var(--pp-color); }
        .paper-card.pol::before { background: var(--pol-color); }
        .paper-card.china::before { background: var(--china-color); }
        .paper-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: #cbd5e1;
        }
        .paper-card:hover::before { width: 6px; }
        .category-tag {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-pa { background: #dbeafe; color: #1e40af; }
        .tag-pp { background: #e0f2fe; color: #0369a1; }
        .tag-pol { background: #e0e7ff; color: #4f46e5; }
        .tag-china { background: #cffafe; color: #0891b2; }
        .journal-tag {
            font-size: 12px;
            color: #64748b;
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
        .bookmark-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #94a3b8;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        .bookmark-btn:hover {
            background: #dbeafe;
            color: #2563eb;
            border-color: #3b82f6;
        }
        .bookmark-btn.saved {
            background: #dbeafe;
            color: #2563eb;
            border-color: #3b82f6;
        }
        .paper-card.dragging {
            opacity: 0.7;
            transform: scale(0.98);
            cursor: grabbing;
        }
        .folder-sidebar {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 16px;
        }
        .folder-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        .folder-item:hover { background: #f1f5f9; }
        .folder-item.active {
            background: #dbeafe;
            color: #1e40af;
            font-weight: 500;
        }
        .folder-item.drag-over {
            background: #dbeafe;
            border: 2px dashed #3b82f6;
        }
        .search-container {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .checkbox-item:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        .checkbox-item.checked {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
        }
        .journal-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .journal-table th {
            background: #f8fafc;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }
        .journal-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }
        .journal-table tr:hover { background: #f8fafc; }
        .filter-tab {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
        }
        .filter-tab:hover { background: #f8fafc; border-color: #cbd5e1; }
        .filter-tab.active {
            background: #1e293b;
            color: white;
            border-color: #1e293b;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        .abstract-text {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
            color: #64748b;
        }
        .abstract-text.expanded { -webkit-line-clamp: unset; }
        .expand-btn {
            color: #3b82f6;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            font-weight: 500;
        }
        #themeRiverChart { width: 100%; height: 400px; }
        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <nav class="navbar sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-18 py-3">
                <div class="flex items-center gap-4">
                    <div class="w-11 h-11 bg-gradient-to-br from-blue-400 to-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-500/30">
                        <i class="fas fa-atlas"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white tracking-tight">Research Atlas</h1>
                        <p class="text-xs text-slate-400">文献追踪系统</p>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-2">
                    <button onclick="switchTab('discover')" class="nav-item active" data-tab="discover">
                        <i class="fas fa-compass"></i>发现
                    </button>
                    <button onclick="switchTab('pa')" class="nav-item" data-tab="pa">
                        <i class="fas fa-landmark"></i>公共行政
                    </button>
                    <button onclick="switchTab('pp')" class="nav-item" data-tab="pp">
                        <i class="fas fa-file-contract"></i>公共政策
                    </button>
                    <button onclick="switchTab('pol')" class="nav-item" data-tab="pol">
                        <i class="fas fa-balance-scale"></i>政治学
                    </button>
                    <button onclick="switchTab('china')" class="nav-item" data-tab="china">
                        <i class="fas fa-dragon"></i>中国研究
                    </button>
                    <button onclick="switchTab('journals')" class="nav-item" data-tab="journals">
                        <i class="fas fa-book"></i>期刊导航
                    </button>
                    <button onclick="switchTab('favorites')" class="nav-item" data-tab="favorites">
                        <i class="fas fa-folder-open"></i>收藏
                        <span id="nav-fav-count" class="ml-1.5 bg-blue-400 text-white text-xs px-1.5 py-0.5 rounded-full hidden">0</span>
                    </button>
                    <button onclick="switchTab('search')" class="nav-item" data-tab="search">
                        <i class="fas fa-search"></i>搜索
                    </button>
                </div>
                <div class="text-sm text-blue-200">
                    收录 <span id="total-count" class="font-semibold text-white">0</span> 篇文献
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="loading-state" class="text-center py-20">
            <div class="loading mb-4"></div>
            <p class="text-slate-500">正在加载数据...</p>
        </div>

        <div id="error-state" class="hidden text-center py-20">
            <div class="text-red-500 text-5xl mb-4">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <p class="text-slate-600 mb-4">数据加载失败</p>
            <button onclick="loadData()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-redo mr-2"></i>重新加载
            </button>
        </div>

        <div id="tab-discover" class="tab-content">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="stat-card cursor-pointer" onclick="switchTab('pa')">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-slate-500">公共行政</span>
                        <span class="category-tag tag-pa">PA</span>
                    </div>
                    <div class="text-2xl font-bold text-slate-800" id="stat-pa">0</div>
                    <div class="text-xs text-slate-400 mt-1">20本期刊</div>
                </div>
                <div class="stat-card cursor-pointer" onclick="switchTab('pp')">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-slate-500">公共政策</span>
                        <span class="category-tag tag-pp">PP</span>
                    </div>
                    <div class="text-2xl font-bold text-slate-800" id="stat-pp">0</div>
                    <div class="text-xs text-slate-400 mt-1">23本期刊</div>
                </div>
                <div class="stat-card cursor-pointer" onclick="switchTab('pol')">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-slate-500">政治学</span>
                        <span class="category-tag tag-pol">POL</span>
                    </div>
                    <div class="text-2xl font-bold text-slate-800" id="stat-pol">0</div>
                    <div class="text-xs text-slate-400 mt-1">36本期刊</div>
                </div>
                <div class="stat-card cursor-pointer" onclick="switchTab('china')">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-slate-500">中国研究</span>
                        <span class="category-tag tag-china">CHINA</span>
                    </div>
                    <div class="text-2xl font-bold text-slate-800" id="stat-china">0</div>
                    <div class="text-xs text-slate-400 mt-1">7本期刊</div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 p-6 mb-8">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">
                            <i class="fas fa-water text-blue-500 mr-2"></i>研究主题演变
                        </h2>
                        <p class="text-sm text-slate-500 mt-1">各领域关键词热度时序变化</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setThemeRiverCategory('all')" class="filter-tab active" data-category="all">全部</button>
                        <button onclick="setThemeRiverCategory('pa')" class="filter-tab" data-category="pa">PA</button>
                        <button onclick="setThemeRiverCategory('pp')" class="filter-tab" data-category="pp">PP</button>
                        <button onclick="setThemeRiverCategory('pol')" class="filter-tab" data-category="pol">POL</button>
                        <button onclick="setThemeRiverCategory('china')" class="filter-tab" data-category="china">CHINA</button>
                    </div>
                </div>
                <div id="themeRiverChart"></div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 p-6 mb-8">
                <h2 class="text-xl font-bold text-slate-800 mb-4">
                    <i class="fas fa-chart-line text-blue-500 mr-2"></i>近30天发文趋势
                </h2>
                <div class="h-64">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-slate-200 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-slate-800">
                        <i class="fas fa-dice text-amber-500 mr-2"></i>精选推荐
                    </h2>
                    <button onclick="refreshRandomPapers()" class="text-blue-600 hover:text-blue-800 font-medium">
                        <i class="fas fa-sync-alt mr-1"></i>换一批
                    </button>
                </div>
                <div id="random-papers" class="space-y-4"></div>
            </div>
        </div>

        <div id="tab-pa" class="tab-content hidden">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <select id="pa-journal-filter" onchange="filterPAPapers()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">全部期刊</option>
                </select>
                <select id="pa-time-filter" onchange="filterPAPapers()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="">全部时间</option>
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                    <option value="365">最近1年</option>
                </select>
            </div>
            <div id="pa-papers-list" class="space-y-4"></div>
        </div>

        <div id="tab-pp" class="tab-content hidden">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <select id="pp-journal-filter" onchange="filterPPPapers()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                    <option value="">全部期刊</option>
                </select>
                <select id="pp-time-filter" onchange="filterPPPapers()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                    <option value="">全部时间</option>
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                    <option value="365">最近1年</option>
                </select>
            </div>
            <div id="pp-papers-list" class="space-y-4"></div>
        </div>

        <div id="tab-pol" class="tab-content hidden">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <select id="pol-journal-filter" onchange="filterPOLPapers()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-violet-500 bg-white">
                    <option value="">全部期刊</option>
                </select>
                <select id="pol-time-filter" onchange="filterPOLPapers()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-violet-500 bg-white">
                    <option value="">全部时间</option>
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                    <option value="365">最近1年</option>
                </select>
            </div>
            <div id="pol-papers-list" class="space-y-4"></div>
        </div>

        <div id="tab-china" class="tab-content hidden">
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <select id="china-journal-filter" onchange="filterChinaPapers()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 bg-white">
                    <option value="">全部期刊</option>
                </select>
                <select id="china-time-filter" onchange="filterChinaPapers()" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 bg-white">
                    <option value="">全部时间</option>
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                    <option value="365">最近1年</option>
                </select>
            </div>
            <div id="china-papers-list" class="space-y-4"></div>
        </div>

        <div id="tab-journals" class="tab-content hidden">
            <div class="bg-gradient-to-r from-slate-800 to-slate-900 rounded-2xl p-8 text-white mb-6">
                <h2 class="text-3xl font-bold mb-2">
                    <i class="fas fa-book-open mr-3 text-amber-400"></i>期刊导航
                </h2>
                <p class="text-slate-300">收录86本SSCI顶级期刊，点击期刊名称访问官网</p>
            </div>
            
            <div class="bg-white rounded-xl border border-slate-200 p-4 mb-6">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="filterJournals('all')" class="filter-tab active" data-journal-filter="all">全部</button>
                        <button onclick="filterJournals('pa')" class="filter-tab" data-journal-filter="pa">公共行政</button>
                        <button onclick="filterJournals('pp')" class="filter-tab" data-journal-filter="pp">公共政策</button>
                        <button onclick="filterJournals('pol')" class="filter-tab" data-journal-filter="pol">政治学</button>
                        <button onclick="filterJournals('china')" class="filter-tab" data-journal-filter="china">中国研究</button>
                    </div>
                    <div class="flex-1">
                        <input type="text" id="journal-search" placeholder="搜索期刊名称..." 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                               oninput="searchJournals(this.value)">
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <table class="journal-table">
                    <thead>
                        <tr>
                            <th class="w-24">领域</th>
                            <th>期刊名称</th>
                            <th class="w-32 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="journals-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-favorites" class="tab-content hidden">
            <div class="flex gap-6">
                <div class="w-72 flex-shrink-0">
                    <div class="folder-sidebar">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-semibold text-slate-800">
                                <i class="fas fa-folder text-amber-500 mr-2"></i>收藏夹
                            </h3>
                            <button onclick="showCreateFolderModal()" class="text-blue-600 hover:text-blue-800 w-8 h-8 rounded-lg hover:bg-blue-50 flex items-center justify-center">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                        <div id="folder-list" class="space-y-1">
                            <div class="folder-item active" onclick="selectFolder('all')" ondragover="allowDrop(event)" ondrop="dropOnFolder(event, 'all')">
                                <i class="fas fa-folder-open text-slate-400"></i>
                                <span class="flex-1">全部收藏</span>
                                <span id="folder-count-all" class="text-xs bg-slate-200 px-2 py-0.5 rounded-full">0</span>
                            </div>
                        </div>
                    </div>
                </div>

        // ==================== 数据加载 ====================
        async function loadData() {
            try {
                document.getElementById('loading-state').classList.remove('hidden');
                document.getElementById('error-state').classList.add('hidden');
                
                // 尝试从sessionStorage读取缓存数据
                const cachedData = sessionStorage.getItem('research-atlas-data');
                const cachedTime = sessionStorage.getItem('research-atlas-data-time');
                const cacheValid = cachedData && cachedTime && (Date.now() - parseInt(cachedTime)) < 300000; // 5分钟缓存
                
                let data = null;
                
                // 如果有有效缓存，先显示缓存数据
                if (cacheValid) {
                    try {
                        data = JSON.parse(cachedData);
                        processLoadedData(data);
                        document.getElementById('loading-state').classList.add('hidden');
                        // 后台刷新数据
                        fetchFreshData();
                        return;
                    } catch (e) { console.log('缓存数据解析失败'); }
                }
                
                // 从服务器加载数据
                data = await fetchFreshData();
                if (data) {
                    processLoadedData(data);
                    // 缓存数据
                    try {
                        sessionStorage.setItem('research-atlas-data', JSON.stringify(data));
                        sessionStorage.setItem('research-atlas-data-time', Date.now().toString());
                    } catch (e) { console.log('数据缓存失败'); }
                }
                
                document.getElementById('loading-state').classList.add('hidden');
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
            }
        }
        
        async function fetchFreshData() {
            const paths = ['data/data.json', './data/data.json', '../data/data.json'];
            
            for (const path of paths) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 30000); // 30秒超时
                    
                    const response = await fetch(path, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        return await response.json();
                    }
                } catch (e) { continue; }
            }
            return null;
        }
        
        function processLoadedData(data) {
            if (!data) throw new Error('无法加载数据文件');
            
            allPapers = data.papers || [];
            allJournals = [...new Set(allPapers.map(p => p.journal_name))].filter(Boolean).sort();
            
            allPapers.forEach(paper => {
                if (!paper.category) paper.category = inferCategory(paper.journal_name);
            });
            
            updateStats(data.stats);
            initCharts(data.stats);
            renderAll();
        }

        function inferCategory(journalName) {
            if (!journalName) return 'PA';
            const name = journalName.toLowerCase();
            if (journalCategories.pa.some(j => j.toLowerCase() === name)) return 'PA';
            if (journalCategories.pp.some(j => j.toLowerCase() === name)) return 'PP';
            if (journalCategories.pol.some(j => j.toLowerCase() === name)) return 'POL';
            if (journalCategories.china.some(j => j.toLowerCase() === name)) return 'CHINA';
            return 'PA';
        }

        function updateStats(stats) {
            if (stats) {
                document.getElementById('total-count').textContent = stats.total || allPapers.length;
                document.getElementById('stat-pa').textContent = stats.pa_count || allPapers.filter(p => p.category === 'PA').length;
                document.getElementById('stat-pp').textContent = stats.pp_count || allPapers.filter(p => p.category === 'PP').length;
                document.getElementById('stat-pol').textContent = stats.pol_count || allPapers.filter(p => p.category === 'POL').length;
                document.getElementById('stat-china').textContent = stats.china_count || allPapers.filter(p => p.category === 'CHINA').length;
            } else {
                document.getElementById('total-count').textContent = allPapers.length;
                document.getElementById('stat-pa').textContent = allPapers.filter(p => p.category === 'PA').length;
                document.getElementById('stat-pp').textContent = allPapers.filter(p => p.category === 'PP').length;
                document.getElementById('stat-pol').textContent = allPapers.filter(p => p.category === 'POL').length;
                document.getElementById('stat-china').textContent = allPapers.filter(p => p.category === 'CHINA').length;
            }
        }

        function initCharts(stats) {
            const ctx = document.getElementById('trendChart');
            if (ctx && stats && stats.trend) {
                if (trendChart) trendChart.destroy();
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: stats.trend.map(t => t.date.slice(5)),
                        datasets: [{
                            label: '发文数量',
                            data: stats.trend.map(t => t.count),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3,
                            pointBackgroundColor: '#3b82f6'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                    }
                });
            }
            initThemeRiverChart();
        }

        function initThemeRiverChart() {
            const chartDom = document.getElementById('themeRiverChart');
            if (!chartDom) return;
            if (themeRiverChart) themeRiverChart.dispose();
            themeRiverChart = echarts.init(chartDom);
            updateThemeRiverChart();
        }

        function updateThemeRiverChart() {
            if (!themeRiverChart) return;
            let papers = allPapers;
            if (currentThemeCategory !== 'all') {
                papers = allPapers.filter(p => p.category === currentThemeCategory.toUpperCase());
            }
            
            const keywordData = {};
            papers.forEach(paper => {
                const date = paper.published_date ? paper.published_date.slice(0, 7) : '';
                if (!date) return;
                const keywords = paper.keywords || [];
                keywords.forEach(keyword => {
                    if (!keywordData[keyword]) keywordData[keyword] = {};
                    if (!keywordData[keyword][date]) keywordData[keyword][date] = 0;
                    keywordData[keyword][date]++;
                });
            });
            
            const topKeywords = Object.entries(keywordData)
                .map(([kw, dates]) => ({ keyword: kw, total: Object.values(dates).reduce((a, b) => a + b, 0) }))
                .sort((a, b) => b.total - a.total)
                .slice(0, 15)
                .map(k => k.keyword);
            
            const riverData = [];
            topKeywords.forEach(keyword => {
                Object.entries(keywordData[keyword] || {}).forEach(([date, count]) => {
                    riverData.push([date, count, keyword]);
                });
            });
            
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'line' } },
                singleAxis: {
                    top: 50, bottom: 50, axisTick: {}, axisLabel: {}, type: 'time',
                    axisPointer: { animation: true, label: { show: true } },
                    splitLine: { show: true, lineStyle: { type: 'dashed', opacity: 0.2 } }
                },
                series: [{
                    type: 'themeRiver',
                    emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' } },
                    data: riverData,
                    label: { show: true, fontSize: 11 }
                }]
            };
            themeRiverChart.setOption(option);
        }

        function setThemeRiverCategory(category) {
            currentThemeCategory = category;
            document.querySelectorAll('#tab-discover .filter-tab').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) btn.classList.add('active');
            });
            updateThemeRiverChart();
        }

        function populateJournalFilters() {
            const paSelect = document.getElementById('pa-journal-filter');
            const ppSelect = document.getElementById('pp-journal-filter');
            const polSelect = document.getElementById('pol-journal-filter');
            const chinaSelect = document.getElementById('china-journal-filter');
            
            const paJournals = allJournals.filter(j => journalCategories.pa.includes(j));
            const ppJournals = allJournals.filter(j => journalCategories.pp.includes(j));
            const polJournals = allJournals.filter(j => journalCategories.pol.includes(j));
            const chinaJournals = allJournals.filter(j => journalCategories.china.includes(j));
            
            populateSelect(paSelect, paJournals);
            populateSelect(ppSelect, ppJournals);
            populateSelect(polSelect, polJournals);
            populateSelect(chinaSelect, chinaJournals);
            
            filterPAPapers();
            filterPPPapers();
            filterPOLPapers();
            filterChinaPapers();
        }

        function populateSelect(select, journals) {
            const currentValue = select.value;
            select.innerHTML = '<option value="">全部期刊</option>';
            journals.forEach(journal => {
                const option = document.createElement('option');
                option.value = journal;
                option.textContent = journal;
                select.appendChild(option);
            });
            select.value = currentValue;
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.tab === tabName) item.classList.add('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            if (tabName === 'favorites') renderFavorites();
        }

        function filterPAPapers() {
            const journal = document.getElementById('pa-journal-filter').value;
            const days = document.getElementById('pa-time-filter').value;
            renderPaperList('pa-papers-list', filterPapers('PA', journal, days));
        }

        function filterPPPapers() {
            const journal = document.getElementById('pp-journal-filter').value;
            const days = document.getElementById('pp-time-filter').value;
            renderPaperList('pp-papers-list', filterPapers('PP', journal, days));
        }

        function filterPOLPapers() {
            const journal = document.getElementById('pol-journal-filter').value;
            const days = document.getElementById('pol-time-filter').value;
            renderPaperList('pol-papers-list', filterPapers('POL', journal, days));
        }

        function filterChinaPapers() {
            const journal = document.getElementById('china-journal-filter').value;
            const days = document.getElementById('china-time-filter').value;
            renderPaperList('china-papers-list', filterPapers('CHINA', journal, days));
        }

        function filterPapers(category, journal, days) {
            let filtered = allPapers.filter(p => p.category === category);
            if (journal) filtered = filtered.filter(p => p.journal_name === journal);
            if (days) {
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - parseInt(days));
                filtered = filtered.filter(p => p.published_date && new Date(p.published_date) >= cutoff);
            }
            return filtered.sort((a, b) => new Date(b.published_date) - new Date(a.published_date));
        }

        function renderPaperList(containerId, papers) {
            const container = document.getElementById(containerId);
            if (!container) return;
            if (papers.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-400"><i class="fas fa-inbox text-4xl mb-3"></i><p>暂无符合条件的文献</p></div>`;
                return;
            }
            container.innerHTML = papers.map(paper => createPaperCard(paper)).join('');
        }

        function createPaperCard(paper) {
            const categoryClass = paper.category ? paper.category.toLowerCase() : 'pa';
            const categoryTag = getCategoryTag(paper.category);
            const isSaved = paperFolders[paper.openalex_id];
            const bookmarkClass = isSaved ? 'saved' : '';
            
            return `
                <div class="paper-card ${categoryClass} p-5" draggable="true" ondragstart="dragStart(event, '${paper.openalex_id}')" ondragend="dragEnd(event)">
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                ${categoryTag}
                                <span class="journal-tag">${paper.journal_name || '未知期刊'}</span>
                                <span class="text-xs text-slate-400">${paper.published_date || ''}</span>
                            </div>
                            <h3 class="text-lg font-semibold text-slate-800 mb-2 leading-tight cursor-pointer hover:text-blue-600 transition" onclick="showPaperDetail('${paper.openalex_id}')">
                                ${paper.title || '无标题'}
                            </h3>
                            <p class="text-sm text-slate-600 mb-2">
                                <i class="fas fa-users mr-1 text-slate-400"></i>
                                ${paper.authors ? paper.authors.slice(0, 5).join(', ') : '未知作者'}${paper.authors && paper.authors.length > 5 ? ' 等' : ''}
                            </p>
                            <p class="abstract-text text-sm" id="abstract-${paper.openalex_id}">${paper.abstract || '暂无摘要'}</p>
                            ${paper.abstract && paper.abstract.length > 100 ? `<div class="expand-btn" onclick="toggleAbstract('${paper.openalex_id}')"><i class="fas fa-chevron-down mr-1"></i>展开更多</div>` : ''}
                            ${paper.keywords && paper.keywords.length > 0 ? `<div class="flex flex-wrap gap-1 mt-3">${paper.keywords.slice(0, 5).map(kw => `<span class="text-xs px-2 py-1 bg-slate-100 text-slate-600 rounded">${kw}</span>`).join('')}</div>` : ''}
                        </div>
                        <div class="flex flex-col gap-2">
                            <button class="bookmark-btn ${bookmarkClass}" onclick="showAddToFolderModal('${paper.openalex_id}')" title="${isSaved ? '已收藏' : '添加到收藏'}">
                                <i class="fas fa-bookmark"></i>
                            </button>
                            ${paper.url ? `<a href="${paper.url}" target="_blank" class="bookmark-btn" title="查看原文"><i class="fas fa-external-link-alt"></i></a>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function getCategoryTag(category) {
            const tags = {
                'PA': '<span class="category-tag tag-pa">PA</span>',
                'PP': '<span class="category-tag tag-pp">PP</span>',
                'POL': '<span class="category-tag tag-pol">POL</span>',
                'CHINA': '<span class="category-tag tag-china">CHINA</span>'
            };
            return tags[category] || tags['PA'];
        }

        function toggleAbstract(paperId) {
            const abstractEl = document.getElementById(`abstract-${paperId}`);
            const btn = abstractEl.nextElementSibling;
            if (abstractEl.classList.contains('expanded')) {
                abstractEl.classList.remove('expanded');
                btn.innerHTML = '<i class="fas fa-chevron-down mr-1"></i>展开更多';
            } else {
                abstractEl.classList.add('expanded');
                btn.innerHTML = '<i class="fas fa-chevron-up mr-1"></i>收起';
            }
        }

        function refreshRandomPapers() {
            const container = document.getElementById('random-papers');
            if (!container || allPapers.length === 0) return;
            const shuffled = [...allPapers].sort(() => 0.5 - Math.random());
            container.innerHTML = shuffled.slice(0, 5).map(paper => createPaperCard(paper)).join('');
        }

        let currentJournalFilter = 'all';

        function renderJournalsTable() {
            const tbody = document.getElementById('journals-table-body');
            if (!tbody) return;
            let html = '';
            const categories = [
                { key: 'pa', name: '公共行政', class: 'tag-pa' },
                { key: 'pp', name: '公共政策', class: 'tag-pp' },
                { key: 'pol', name: '政治学', class: 'tag-pol' },
                { key: 'china', name: '中国研究', class: 'tag-china' }
            ];
            
            categories.forEach(cat => {
                if (currentJournalFilter !== 'all' && currentJournalFilter !== cat.key) return;
                journalCategories[cat.key].forEach(journal => {
                    const url = journalUrls[journal] || '#';
                    html += `
                        <tr data-journal="${journal.toLowerCase()}" data-category="${cat.key}">
                            <td><span class="category-tag ${cat.class}">${cat.key.toUpperCase()}</span></td>
                            <td class="font-medium text-slate-800">${journal}</td>
                            <td class="text-center">
                                <a href="${url}" target="_blank" class="inline-flex items-center gap-1 px-3 py-1 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition text-sm">
                                    <i class="fas fa-external-link-alt text-xs"></i> 访问官网
                                </a>
                            </td>
                        </tr>
                    `;
                });
            });
            tbody.innerHTML = html || '<tr><td colspan="3" class="text-center py-8 text-slate-400">暂无数据</td></tr>';
        }

        function filterJournals(category) {
            currentJournalFilter = category;
            document.querySelectorAll('[data-journal-filter]').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.journalFilter === category) btn.classList.add('active');
            });
            renderJournalsTable();
        }

        function searchJournals(query) {
            const rows = document.querySelectorAll('#journals-table-body tr');
            const lowerQuery = query.toLowerCase();
            rows.forEach(row => {
                const journal = row.dataset.journal;
                row.style.display = (journal && journal.includes(lowerQuery)) ? '' : 'none';
            });
        }

        function dragStart(event, paperId) {
            draggedPaperId = paperId;
            event.target.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
        }

        function dragEnd(event) {
            event.target.classList.remove('dragging');
            draggedPaperId = null;
        }

        function allowDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.add('drag-over');
        }

        function dropOnFolder(event, folderId) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            if (draggedPaperId) addPaperToFolder(draggedPaperId, folderId);
        }

        function renderFolders() {
            const container = document.getElementById('folder-list');
            if (!container) return;
            const allFolder = container.querySelector('[onclick="selectFolder('all')"]');
            container.innerHTML = '';
            container.appendChild(allFolder);
            document.getElementById('folder-count-all').textContent = Object.keys(paperFolders).length;
            
            folders.filter(f => f.id !== 'all').forEach(folder => {
                const count = Object.values(paperFolders).filter(fId => fId === folder.id).length;
                const div = document.createElement('div');
                div.className = `folder-item ${currentFolder === folder.id ? 'active' : ''}`;
                div.onclick = () => selectFolder(folder.id);
                div.ondragover = (e) => allowDrop(e);
                div.ondrop = (e) => dropOnFolder(e, folder.id);
                div.innerHTML = `
                    <i class="fas fa-folder${currentFolder === folder.id ? '-open' : ''} text-slate-400"></i>
                    <span class="flex-1 truncate">${folder.name}</span>
                    <span class="text-xs bg-slate-200 px-2 py-0.5 rounded-full">${count}</span>
                    <button onclick="deleteFolder('${folder.id}', event)" class="text-slate-400 hover:text-red-500 ml-2">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function selectFolder(folderId) {
            currentFolder = folderId;
            renderFolders();
            renderFavorites();
            const folder = folders.find(f => f.id === folderId);
            document.getElementById('current-folder-name').textContent = folder ? folder.name : '全部收藏';
        }

        function renderFavorites() {
            const container = document.getElementById('favorites-list');
            if (!container) return;
            let papers = [];
            if (currentFolder === 'all') {
                papers = allPapers.filter(p => paperFolders[p.openalex_id]);
            } else {
                papers = allPapers.filter(p => paperFolders[p.openalex_id] === currentFolder);
            }
            document.getElementById('current-folder-count').textContent = papers.length;
            
            if (papers.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-slate-400">
                        <i class="fas fa-folder-open text-4xl mb-3"></i>
                        <p>暂无收藏文献</p>
                        <p class="text-sm mt-2">拖拽文献到收藏夹或点击书签图标添加</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = papers.map(paper => createPaperCard(paper)).join('');
        }

        function showCreateFolderModal() {
            document.getElementById('new-folder-name').value = '';
            document.getElementById('create-folder-modal').classList.add('active');
        }

        function createFolder() {
            const name = document.getElementById('new-folder-name').value.trim();
            if (!name) { alert('请输入文件夹名称'); return; }
            const id = 'folder_' + Date.now();
            folders.push({ id, name });
            saveFolders();
            renderFolders();
            closeModal('create-folder-modal');
        }

        function deleteFolder(folderId, event) {
            event.stopPropagation();
            if (!confirm('确定要删除这个文件夹吗？文件夹内的文献将被移出收藏。')) return;
            Object.keys(paperFolders).forEach(paperId => {
                if (paperFolders[paperId] === folderId) delete paperFolders[paperId];
            });
            folders = folders.filter(f => f.id !== folderId);
            if (currentFolder === folderId) currentFolder = 'all';
            saveFolders();
            savePaperFolders();
            renderFolders();
            renderFavorites();
            updateFavCount();
        }

        function showAddToFolderModal(paperId) {
            currentPaperId = paperId;
            const container = document.getElementById('add-folder-list');
            container.innerHTML = folders.filter(f => f.id !== 'all').map(folder => {
                const isInFolder = paperFolders[paperId] === folder.id;
                return `
                    <div class="flex items-center justify-between p-3 rounded-lg hover:bg-slate-50 cursor-pointer" onclick="addPaperToFolder('${paperId}', '${folder.id}')">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-folder${isInFolder ? '-open text-blue-500' : ' text-slate-400'}"></i>
                            <span>${folder.name}</span>
                        </div>
                        ${isInFolder ? '<i class="fas fa-check text-blue-500"></i>' : ''}
                    </div>
                `;
            }).join('') || '<p class="text-center text-slate-400 py-4">暂无文件夹，请先创建</p>';
            document.getElementById('add-folder-modal').classList.add('active');
        }

        function addPaperToFolder(paperId, folderId) {
            paperFolders[paperId] = folderId;
            savePaperFolders();
            renderFolders();
            updateFavCount();
            if (!document.getElementById('tab-favorites').classList.contains('hidden')) renderFavorites();
            refreshPaperCard(paperId);
            closeModal('add-folder-modal');
        }

        function refreshPaperCard(paperId) {
            ['pa-papers-list', 'pp-papers-list', 'pol-papers-list', 'china-papers-list', 'random-papers', 'search-results'].forEach(id => {
                const container = document.getElementById(id);
                if (container) {
                    const btn = container.querySelector(`[onclick="showAddToFolderModal('${paperId}')"]`);
                    if (btn) {
                        const isSaved = paperFolders[paperId];
                        btn.classList.toggle('saved', isSaved);
                        btn.title = isSaved ? '已收藏' : '添加到收藏';
                    }
                }
            });
        }

        function updateFavCount() {
            const count = Object.keys(paperFolders).length;
            const badge = document.getElementById('nav-fav-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function saveFolders() {
            localStorage.setItem('research-atlas-folders', JSON.stringify(folders));
        }

        function savePaperFolders() {
            localStorage.setItem('research-atlas-paper-folders', JSON.stringify(paperFolders));
        }

        function toggleCheckbox(label) {
            const checkbox = label.querySelector('input[type="checkbox"]');
            checkbox.checked = !checkbox.checked;
            label.classList.toggle('checked', checkbox.checked);
            updateSearchFields();
        }

        function updateSearchFields() {
            const checkboxes = document.querySelectorAll('#tab-search input[type="checkbox"]');
            searchFields = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
        }

        function doSearch() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            const category = document.getElementById('search-category').value;
            const days = document.getElementById('search-time').value;
            
            if (!keyword) { alert('请输入搜索关键词'); return; }
            if (searchFields.length === 0) { alert('请至少选择一个搜索范围'); return; }
            
            let results = allPapers.filter(paper => {
                let match = false;
                if (searchFields.includes('title') && paper.title) match = match || paper.title.toLowerCase().includes(keyword);
                if (searchFields.includes('abstract') && paper.abstract) match = match || paper.abstract.toLowerCase().includes(keyword);
                if (searchFields.includes('author') && paper.authors) match = match || paper.authors.some(a => a.toLowerCase().includes(keyword));
                if (searchFields.includes('keyword') && paper.keywords) match = match || paper.keywords.some(k => k.toLowerCase().includes(keyword));
                if (!match) return false;
                if (category && paper.category !== category) return false;
                if (days && paper.published_date) {
                    const cutoff = new Date();
                    cutoff.setDate(cutoff.getDate() - parseInt(days));
                    if (new Date(paper.published_date) < cutoff) return false;
                }
                return true;
            });
            
            document.getElementById('search-results-info').textContent = `找到 ${results.length} 篇相关文献（关键词："${keyword}"）`;
            renderSearchResults(results, keyword);
        }

        function renderSearchResults(papers, keyword) {
            const container = document.getElementById('search-results');
            if (papers.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-400"><i class="fas fa-search text-4xl mb-3"></i><p>未找到相关文献</p></div>`;
                return;
            }
            container.innerHTML = papers.map(paper => {
                const highlightedPaper = {
                    ...paper,
                    title: highlightKeyword(paper.title, keyword),
                    abstract: highlightKeyword(paper.abstract, keyword)
                };
                return createPaperCard(highlightedPaper);
            }).join('');
        }

        function highlightKeyword(text, keyword) {
            if (!text || !keyword) return text;
            const regex = new RegExp(`(${keyword})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 px-1 rounded">$1</mark>');
        }

        function showPaperDetail(paperId) {
            const paper = allPapers.find(p => p.openalex_id === paperId);
            if (!paper) return;
            const content = document.getElementById('paper-detail-content');
            content.innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        ${getCategoryTag(paper.category)}
                        <button onclick="closeModal('paper-detail-modal')" class="text-slate-400 hover:text-slate-600">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-4">${paper.title}</h2>
                    <div class="flex items-center gap-4 mb-4 text-sm text-slate-600">
                        <span><i class="fas fa-book mr-1"></i> ${paper.journal_name || '未知期刊'}</span>
                        <span><i class="fas fa-calendar mr-1"></i> ${paper.published_date || '未知日期'}</span>
                    </div>
                    <div class="mb-4">
                        <h3 class="font-semibold text-slate-800 mb-2">作者</h3>
                        <p class="text-slate-600">${paper.authors ? paper.authors.join(', ') : '未知作者'}</p>
                    </div>
                    <div class="mb-4">
                        <h3 class="font-semibold text-slate-800 mb-2">摘要</h3>
                        <p class="text-slate-600 leading-relaxed">${paper.abstract || '暂无摘要'}</p>
                    </div>
                    ${paper.keywords && paper.keywords.length > 0 ? `
                        <div class="mb-4">
                            <h3 class="font-semibold text-slate-800 mb-2">关键词</h3>
                            <div class="flex flex-wrap gap-2">
                                ${paper.keywords.map(kw => `<span class="px-3 py-1 bg-slate-100 text-slate-700 rounded-full text-sm">${kw}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                    <div class="flex gap-3 mt-6">
                        ${paper.url ? `<a href="${paper.url}" target="_blank" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"><i class="fas fa-external-link-alt mr-2"></i>查看原文</a>` : ''}
                        <button onclick="showAddToFolderModal('${paper.openalex_id}')" class="px-6 py-2 border border-slate-300 rounded-lg hover:bg-slate-50 transition">
                            <i class="fas fa-bookmark mr-2"></i>添加到收藏
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('paper-detail-modal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => modal.classList.remove('active'));
            }
        });
    </script>
</body>
</html>
