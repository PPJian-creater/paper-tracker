<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公管SSCI期刊文献追踪</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .paper-card {
            transition: all 0.3s ease;
        }
        .paper-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .nav-item {
            position: relative;
        }
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #3b82f6;
            transition: width 0.3s;
        }
        .nav-item.active::after,
        .nav-item:hover::after {
            width: 100%;
        }
        .abstract-collapsed {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
        }
        .abstract-expanded {
            -webkit-line-clamp: unset;
            display: block;
        }
        .abstract-hint {
            font-size: 12px;
            color: #3b82f6;
            margin-top: 4px;
            cursor: pointer;
        }
        .heart-icon {
            transition: transform 0.2s;
        }
        .heart-icon:hover {
            transform: scale(1.2);
        }
        .heart-icon.active {
            fill: #ef4444;
            stroke: #ef4444;
        }
        .new-badge {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .highlight {
            background-color: #fef3c7;
            padding: 0 2px;
            border-radius: 2px;
            font-weight: 500;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(59,130,246,.3);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .folder-item {
            cursor: pointer;
            transition: all 0.2s;
        }
        .folder-item:hover {
            background-color: #f3f4f6;
        }
        .folder-item.active {
            background-color: #dbeafe;
            border-left: 3px solid #3b82f6;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }
        .recommend-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .recommend-card:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="glass-effect sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">
                        PA
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">公管SSCI期刊文献追踪</h1>
                        <p class="text-xs text-gray-500">Public Administration & Public Policy</p>
                    </div>
                </div>
                <nav class="hidden md:flex space-x-8">
                    <button onclick="switchTab('discover')" class="nav-item active text-gray-700 hover:text-blue-600 font-medium transition" data-tab="discover">发现</button>
                    <button onclick="switchTab('pa')" class="nav-item text-gray-700 hover:text-blue-600 font-medium transition" data-tab="pa">公共行政</button>
                    <button onclick="switchTab('pp')" class="nav-item text-gray-700 hover:text-blue-600 font-medium transition" data-tab="pp">公共政策</button>
                    <button onclick="switchTab('favorites')" class="nav-item text-gray-700 hover:text-blue-600 font-medium transition" data-tab="favorites">
                        收藏
                        <span id="fav-count" class="ml-1 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full hidden">0</span>
                    </button>
                    <button onclick="switchTab('search')" class="nav-item text-gray-700 hover:text-blue-600 font-medium transition" data-tab="search">搜索</button>
                </nav>
                <div class="text-sm text-gray-500">
                    总计: <span id="total-count" class="font-semibold text-blue-600">0</span> 篇
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Loading State -->
        <div id="loading-state" class="text-center py-20">
            <div class="loading mb-4"></div>
            <p class="text-gray-500">正在加载数据...</p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden text-center py-20">
            <div class="text-red-500 mb-2">
                <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <p class="text-gray-600 mb-4">数据加载失败</p>
            <button onclick="loadData()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                重新加载
            </button>
        </div>

        <!-- Discover Tab -->
        <div id="tab-discover" class="tab-content hidden space-y-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <div class="text-sm text-gray-500 mb-1">总文献数</div>
                    <div class="text-3xl font-bold text-gray-900" id="stat-total">0</div>
                    <div class="text-xs text-gray-400 mt-1">覆盖 <span id="stat-journals">0</span> 本期刊</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 cursor-pointer hover:shadow-md transition" onclick="showTodayPapers()">
                    <div class="text-sm text-gray-500 mb-1">今日更新</div>
                    <div class="text-3xl font-bold text-blue-600" id="stat-today">0</div>
                    <div class="text-xs text-blue-500 mt-1">点击查看详情 →</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <div class="text-sm text-gray-500 mb-1">公共行政 (PA)</div>
                    <div class="text-3xl font-bold text-indigo-600" id="stat-pa">0</div>
                    <div class="text-xs text-gray-400 mt-1">20本期刊</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <div class="text-sm text-gray-500 mb-1">公共政策 (PP)</div>
                    <div class="text-3xl font-bold text-emerald-600" id="stat-pp">0</div>
                    <div class="text-xs text-gray-400 mt-1">23本期刊</div>
                </div>
            </div>

            <!-- Random Recommendation -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-900">🎲 随机推荐</h2>
                    <button onclick="refreshRandomPapers()" class="text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        换一批
                    </button>
                </div>
                <div id="random-papers" class="space-y-4"></div>
            </div>

            <!-- Trend Chart -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">近30天发文趋势</h2>
                <div class="h-64">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- PA Tab -->
        <div id="tab-pa" class="tab-content hidden space-y-6">
            <div class="flex flex-col md:flex-row gap-4 flex-wrap items-center">
                <select id="pa-journal-filter" onchange="filterPAPapers()" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="">全部期刊</option>
                </select>
                <select id="pa-time-filter" onchange="filterPAPapers()" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="">全部时间</option>
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                </select>
            </div>
            <div id="pa-papers-list" class="space-y-4"></div>
        </div>

        <!-- PP Tab -->
        <div id="tab-pp" class="tab-content hidden space-y-6">
            <div class="flex flex-col md:flex-row gap-4 flex-wrap items-center">
                <select id="pp-journal-filter" onchange="filterPPPapers()" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                    <option value="">全部期刊</option>
                </select>
                <select id="pp-time-filter" onchange="filterPPPapers()" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                    <option value="">全部时间</option>
                    <option value="7">最近7天</option>
                    <option value="30">最近30天</option>
                    <option value="90">最近90天</option>
                </select>
            </div>
            <div id="pp-papers-list" class="space-y-4"></div>
        </div>

        <!-- Favorites Tab -->
        <div id="tab-favorites" class="tab-content hidden">
            <div class="flex gap-6">
                <!-- Folder Sidebar -->
                <div class="w-64 flex-shrink-0">
                    <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-semibold text-gray-900">收藏夹</h3>
                            <button onclick="showCreateFolderModal()" class="text-blue-600 hover:text-blue-800">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                            </button>
                        </div>
                        <div id="folder-list" class="space-y-1">
                            <div class="folder-item active px-3 py-2 rounded-lg flex items-center gap-2" onclick="selectFolder('all')">
                                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path>
                                </svg>
                                <span class="flex-1">全部收藏</span>
                                <span id="folder-count-all" class="text-xs bg-gray-200 px-2 py-0.5 rounded-full">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Papers List -->
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-4">
                        <h2 id="current-folder-name" class="text-lg font-semibold text-gray-900">全部收藏</h2>
                        <button id="batch-move-btn" onclick="showMoveToFolderModal()" class="hidden px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm">
                            移动到文件夹
                        </button>
                    </div>
                    <div id="favorites-list" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <!-- Search Tab -->
        <div id="tab-search" class="tab-content hidden space-y-6">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <h2 class="text-lg font-semibold text-gray-900 mb-4">高级搜索</h2>
                <div class="space-y-4">
                    <div class="flex gap-4">
                        <input type="text" id="search-title" placeholder="标题关键词..." 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <input type="text" id="search-author" placeholder="作者..." 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="flex gap-4">
                        <input type="text" id="search-keyword" placeholder="关键词..." 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <input type="text" id="search-abstract" placeholder="摘要内容..." 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="flex gap-4 items-center">
                        <select id="search-category" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="">全部领域</option>
                            <option value="PA">公共行政 (PA)</option>
                            <option value="PP">公共政策 (PP)</option>
                        </select>
                        <button onclick="doSearch()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                            搜索
                        </button>
                        <button onclick="clearSearch()" class="px-4 py-2 text-gray-600 hover:text-gray-800 transition">
                            清空
                        </button>
                    </div>
                </div>
            </div>
            <div id="search-results" class="space-y-4"></div>
        </div>
    </main>

    <!-- Create Folder Modal -->
    <div id="create-folder-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-lg font-semibold mb-4">新建文件夹</h3>
            <input type="text" id="new-folder-name" placeholder="文件夹名称" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('create-folder-modal')" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                <button onclick="createFolder()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">创建</button>
            </div>
        </div>
    </div>

    <!-- Move to Folder Modal -->
    <div id="move-folder-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-lg font-semibold mb-4">移动到文件夹</h3>
            <div id="move-folder-list" class="space-y-2 mb-4 max-h-48 overflow-y-auto"></div>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('move-folder-modal')" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                <button onclick="moveSelectedToFolder()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">移动</button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        let allPapers = [];
        let allJournals = [];
        let favorites = JSON.parse(localStorage.getItem('pa-pp-favorites') || '[]');
        let folders = JSON.parse(localStorage.getItem('pa-pp-folders') || '[{"id": "all", "name": "全部收藏"}]');
        let paperFolders = JSON.parse(localStorage.getItem('pa-pp-paper-folders') || '{}');
        let currentFolder = 'all';
        let selectedPapers = new Set();
        let currentSearchKeyword = '';

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/data.json');
                if (!response.ok) throw new Error('Failed to load');
                
                const data = await response.json();
                // 过滤无效文献（title为null或空）
                allPapers = (data.papers || []).filter(p => p.title && p.title.trim() !== '');
                
                // 提取期刊列表并统计数量
                const journalCounts = {};
                allPapers.forEach(p => {
                    if (!journalCounts[p.journal_name]) {
                        journalCounts[p.journal_name] = { count: 0, category: p.category };
                    }
                    journalCounts[p.journal_name].count++;
                });
                
                allJournals = Object.entries(journalCounts).map(([name, info]) => ({
                    name, 
                    category: info.category,
                    count: info.count
                }));
                
                // 更新UI
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('tab-discover').classList.remove('hidden');
                
                updateStats(data.stats);
                populateJournalFilters();
                renderTrendChart(data.stats?.trend || []);
                refreshRandomPapers();
                filterPAPapers();
                filterPPPapers();
                renderFolders();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
            }
        }

        // 更新统计
        function updateStats(stats) {
            document.getElementById('stat-total').textContent = allPapers.length;
            document.getElementById('stat-journals').textContent = allJournals.length;
            document.getElementById('stat-pa').textContent = allPapers.filter(p => p.category === 'PA').length;
            document.getElementById('stat-pp').textContent = allPapers.filter(p => p.category === 'PP').length;
            document.getElementById('stat-today').textContent = stats?.today || 0;
            document.getElementById('total-count').textContent = allPapers.length;
        }

        // 填充期刊筛选器（带数量）
        function populateJournalFilters() {
            const paJournals = allJournals.filter(j => j.category === 'PA');
            const ppJournals = allJournals.filter(j => j.category === 'PP');
            
            const paSelect = document.getElementById('pa-journal-filter');
            const ppSelect = document.getElementById('pp-journal-filter');
            
            // 保留第一个"全部期刊"选项
            paSelect.innerHTML = '<option value="">全部期刊</option>';
            ppSelect.innerHTML = '<option value="">全部期刊</option>';
            
            paJournals.forEach(j => {
                paSelect.innerHTML += `<option value="${j.name}">${j.name} (${j.count}篇)</option>`;
            });
            
            ppJournals.forEach(j => {
                ppSelect.innerHTML += `<option value="${j.name}">${j.name} (${j.count}篇)</option>`;
            });
        }

        // 切换标签
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            
            if (tabName === 'favorites') renderFavorites();
            if (tabName === 'pa') filterPAPapers();
            if (tabName === 'pp') filterPPPapers();
        }

        // 筛选PA文献
        function filterPAPapers() {
            const journal = document.getElementById('pa-journal-filter').value;
            const days = document.getElementById('pa-time-filter').value;
            
            let filtered = allPapers.filter(p => p.category === 'PA');
            if (journal) filtered = filtered.filter(p => p.journal_name === journal);
            if (days) {
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - parseInt(days));
                filtered = filtered.filter(p => new Date(p.published_date) >= cutoff);
            }
            
            document.getElementById('pa-papers-list').innerHTML = 
                filtered.map(p => renderPaperCard(p)).join('') || '<p class="text-gray-500 text-center py-8">暂无文献</p>';
        }

        // 筛选PP文献
        function filterPPPapers() {
            const journal = document.getElementById('pp-journal-filter').value;
            const days = document.getElementById('pp-time-filter').value;
            
            let filtered = allPapers.filter(p => p.category === 'PP');
            if (journal) filtered = filtered.filter(p => p.journal_name === journal);
            if (days) {
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - parseInt(days));
                filtered = filtered.filter(p => new Date(p.published_date) >= cutoff);
            }
            
            document.getElementById('pp-papers-list').innerHTML = 
                filtered.map(p => renderPaperCard(p)).join('') || '<p class="text-gray-500 text-center py-8">暂无文献</p>';
        }

        // 渲染文献卡片
        function renderPaperCard(paper, options = {}) {
            const isFav = favorites.includes(paper.openalex_id);
            const authors = (paper.authors || []).slice(0, 3).join(', ') + ((paper.authors || []).length > 3 ? ' et al.' : '');
            const keywords = (paper.keywords || []).slice(0, 5).map(k => 
                `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded mr-1">${highlightText(k)}</span>`
            ).join('');
            
            const abstract = paper.abstract || '暂无摘要';
            const isLongAbstract = abstract.length > 150;
            
            const showCheckbox = options.showCheckbox && currentFolder !== 'all';
            const isSelected = selectedPapers.has(paper.openalex_id);
            
            return `
                <div class="paper-card bg-white rounded-xl p-6 border border-gray-100" data-paper-id="${paper.openalex_id}">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex-1 pr-4">
                            <div class="flex items-center gap-2 mb-2">
                                ${showCheckbox ? `
                                    <input type="checkbox" ${isSelected ? 'checked' : ''} 
                                           onchange="toggleSelectPaper('${paper.openalex_id}')"
                                           class="w-4 h-4 text-blue-600 rounded">
                                ` : ''}
                                <span class="text-xs ${paper.category === 'PA' ? 'text-indigo-600 bg-indigo-50' : 'text-emerald-600 bg-emerald-50'} px-2 py-0.5 rounded font-medium">${paper.category}</span>
                                <span class="text-xs text-gray-500">${paper.journal_name}</span>
                                <span class="text-xs text-gray-400">${paper.published_date}</span>
                            </div>
                            <h3 class="text-lg font-semibold text-gray-900">${highlightText(paper.title)}</h3>
                        </div>
                        <button onclick="toggleFavorite('${paper.openalex_id}')" class="heart-icon ${isFav ? 'active' : ''}">
                            <svg class="w-6 h-6 ${isFav ? 'text-red-500' : 'text-gray-400'}" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="text-sm text-gray-600 mb-2">作者: ${highlightText(authors || '未知')}</div>
                    <div class="text-sm text-gray-700 mb-2 abstract-collapsed" id="abstract-${paper.openalex_id}" onclick="toggleAbstract('${paper.openalex_id}')">
                        ${highlightText(abstract)}
                    </div>
                    ${isLongAbstract ? `
                        <div class="abstract-hint" onclick="toggleAbstract('${paper.openalex_id}')">
                            <span id="abstract-hint-${paper.openalex_id}">点击展开更多 ↓</span>
                        </div>
                    ` : ''}
                    <div class="flex flex-wrap gap-1 mb-3">${keywords}</div>
                    ${paper.url ? `<a href="${paper.url}" target="_blank" class="text-sm text-blue-600 hover:underline">查看原文 →</a>` : ''}
                </div>
            `;
        }

        // 高亮文本
        function highlightText(text) {
            if (!currentSearchKeyword || !text) return text;
            const regex = new RegExp(`(${escapeRegex(currentSearchKeyword)})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // 转义正则特殊字符
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 切换摘要展开/收起
        function toggleAbstract(paperId) {
            const abstractEl = document.getElementById(`abstract-${paperId}`);
            const hintEl = document.getElementById(`abstract-hint-${paperId}`);
            
            if (abstractEl.classList.contains('abstract-collapsed')) {
                abstractEl.classList.remove('abstract-collapsed');
                abstractEl.classList.add('abstract-expanded');
                if (hintEl) hintEl.textContent = '点击收起 ↑';
            } else {
                abstractEl.classList.add('abstract-collapsed');
                abstractEl.classList.remove('abstract-expanded');
                if (hintEl) hintEl.textContent = '点击展开更多 ↓';
            }
        }

        // 切换收藏
        function toggleFavorite(paperId) {
            const index = favorites.indexOf(paperId);
            if (index > -1) {
                favorites.splice(index, 1);
                // 从文件夹中也移除
                delete paperFolders[paperId];
            } else {
                favorites.push(paperId);
            }
            localStorage.setItem('pa-pp-favorites', JSON.stringify(favorites));
            localStorage.setItem('pa-pp-paper-folders', JSON.stringify(paperFolders));
            updateFavCount();
            
            // 刷新当前视图
            const activeTab = document.querySelector('.nav-item.active').dataset.tab;
            if (activeTab === 'pa') filterPAPapers();
            else if (activeTab === 'pp') filterPPPapers();
            else if (activeTab === 'favorites') renderFavorites();
            else if (activeTab === 'search') doSearch();
            else if (activeTab === 'discover') refreshRandomPapers();
        }

        // 更新收藏数
        function updateFavCount() {
            const count = favorites.length;
            const badge = document.getElementById('fav-count');
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
            document.getElementById('folder-count-all').textContent = count;
        }

        // 渲染文件夹列表
        function renderFolders() {
            const folderList = document.getElementById('folder-list');
            const customFolders = folders.filter(f => f.id !== 'all');
            
            // 统计每个文件夹的论文数
            const folderCounts = {};
            Object.values(paperFolders).forEach(folderId => {
                folderCounts[folderId] = (folderCounts[folderId] || 0) + 1;
            });
            
            let html = `
                <div class="folder-item ${currentFolder === 'all' ? 'active' : ''} px-3 py-2 rounded-lg flex items-center gap-2" onclick="selectFolder('all')">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path>
                    </svg>
                    <span class="flex-1">全部收藏</span>
                    <span class="text-xs bg-gray-200 px-2 py-0.5 rounded-full">${favorites.length}</span>
                </div>
            `;
            
            customFolders.forEach(folder => {
                const count = folderCounts[folder.id] || 0;
                html += `
                    <div class="folder-item ${currentFolder === folder.id ? 'active' : ''} px-3 py-2 rounded-lg flex items-center gap-2" onclick="selectFolder('${folder.id}')">
                        <svg class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                        </svg>
                        <span class="flex-1">${folder.name}</span>
                        <span class="text-xs bg-gray-200 px-2 py-0.5 rounded-full">${count}</span>
                    </div>
                `;
            });
            
            folderList.innerHTML = html;
        }

        // 选择文件夹
        function selectFolder(folderId) {
            currentFolder = folderId;
            selectedPapers.clear();
            document.getElementById('batch-move-btn').classList.add('hidden');
            renderFolders();
            renderFavorites();
        }

        // 渲染收藏
        function renderFavorites() {
            const folderName = folders.find(f => f.id === currentFolder)?.name || '全部收藏';
            document.getElementById('current-folder-name').textContent = folderName;
            
            let favPapers;
            if (currentFolder === 'all') {
                favPapers = allPapers.filter(p => favorites.includes(p.openalex_id));
            } else {
                favPapers = allPapers.filter(p => {
                    return favorites.includes(p.openalex_id) && paperFolders[p.openalex_id] === currentFolder;
                });
            }
            
            document.getElementById('favorites-list').innerHTML = 
                favPapers.map(p => renderPaperCard(p, { showCheckbox: currentFolder !== 'all' })).join('') || 
                '<p class="text-gray-500 text-center py-8">暂无收藏</p>';
        }

        // 显示创建文件夹弹窗
        function showCreateFolderModal() {
            document.getElementById('create-folder-modal').classList.add('active');
            document.getElementById('new-folder-name').value = '';
            document.getElementById('new-folder-name').focus();
        }

        // 创建文件夹
        function createFolder() {
            const name = document.getElementById('new-folder-name').value.trim();
            if (!name) return;
            
            const newFolder = {
                id: 'folder_' + Date.now(),
                name: name
            };
            folders.push(newFolder);
            localStorage.setItem('pa-pp-folders', JSON.stringify(folders));
            
            closeModal('create-folder-modal');
            renderFolders();
        }

        // 选择论文
        function toggleSelectPaper(paperId) {
            if (selectedPapers.has(paperId)) {
                selectedPapers.delete(paperId);
            } else {
                selectedPapers.add(paperId);
            }
            
            const btn = document.getElementById('batch-move-btn');
            if (selectedPapers.size > 0) {
                btn.textContent = `移动到文件夹 (${selectedPapers.size})`;
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
        }

        // 显示移动到文件夹弹窗
        function showMoveToFolderModal() {
            const folderList = document.getElementById('move-folder-list');
            const customFolders = folders.filter(f => f.id !== 'all' && f.id !== currentFolder);
            
            if (customFolders.length === 0) {
                alert('请先创建其他文件夹');
                return;
            }
            
            folderList.innerHTML = customFolders.map(f => `
                <div class="p-3 border rounded-lg cursor-pointer hover:bg-gray-50" onclick="selectTargetFolder('${f.id}')">
                    <div class="flex items-center gap-2">
                        <input type="radio" name="target-folder" value="${f.id}" id="target-${f.id}">
                        <label for="target-${f.id}" class="flex-1 cursor-pointer">${f.name}</label>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('move-folder-modal').classList.add('active');
        }

        let targetFolderId = null;
        function selectTargetFolder(folderId) {
            targetFolderId = folderId;
            document.getElementById(`target-${folderId}`).checked = true;
        }

        // 移动选中的论文
        function moveSelectedToFolder() {
            if (!targetFolderId) {
                alert('请选择目标文件夹');
                return;
            }
            
            selectedPapers.forEach(paperId => {
                paperFolders[paperId] = targetFolderId;
            });
            
            localStorage.setItem('pa-pp-paper-folders', JSON.stringify(paperFolders));
            selectedPapers.clear();
            document.getElementById('batch-move-btn').classList.add('hidden');
            
            closeModal('move-folder-modal');
            renderFolders();
            renderFavorites();
        }

        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 搜索
        function doSearch() {
            const title = document.getElementById('search-title').value.toLowerCase().trim();
            const author = document.getElementById('search-author').value.toLowerCase().trim();
            const keyword = document.getElementById('search-keyword').value.toLowerCase().trim();
            const abstract = document.getElementById('search-abstract').value.toLowerCase().trim();
            const category = document.getElementById('search-category').value;
            
            // 构建搜索关键词用于高亮
            currentSearchKeyword = title || author || keyword || abstract;
            
            const results = allPapers.filter(p => {
                if (category && p.category !== category) return false;
                if (title && !(p.title || '').toLowerCase().includes(title)) return false;
                if (author && !(p.authors || []).some(a => a.toLowerCase().includes(author))) return false;
                if (keyword && !(p.keywords || []).some(k => k.toLowerCase().includes(keyword))) return false;
                if (abstract && !(p.abstract || '').toLowerCase().includes(abstract)) return false;
                return true;
            });
            
            document.getElementById('search-results').innerHTML = 
                `<p class="text-gray-500 mb-4">找到 ${results.length} 条结果</p>` +
                results.map(p => renderPaperCard(p)).join('');
        }

        // 清空搜索
        function clearSearch() {
            document.getElementById('search-title').value = '';
            document.getElementById('search-author').value = '';
            document.getElementById('search-keyword').value = '';
            document.getElementById('search-abstract').value = '';
            document.getElementById('search-category').value = '';
            currentSearchKeyword = '';
            document.getElementById('search-results').innerHTML = '';
        }

        // 渲染趋势图
        function renderTrendChart(trendData) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: trendData.map(d => d.date.slice(5)),
                    datasets: [{
                        label: '发文数量',
                        data: trendData.map(d => d.count),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 随机推荐
        function refreshRandomPapers() {
            const count = 3;
            const shuffled = [...allPapers].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, count);
            
            document.getElementById('random-papers').innerHTML = 
                selected.map(p => `
                    <div class="recommend-card" onclick="showPaperDetail('${p.openalex_id}')">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="text-xs bg-white/20 px-2 py-0.5 rounded">${p.category}</span>
                                    <span class="text-xs opacity-80">${p.journal_name}</span>
                                </div>
                                <h4 class="font-semibold mb-2 line-clamp-2">${p.title}</h4>
                                <p class="text-sm opacity-80 line-clamp-1">${(p.authors || []).slice(0, 3).join(', ')}</p>
                            </div>
                            <svg class="w-6 h-6 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                        </div>
                    </div>
                `).join('');
        }

        // 显示论文详情（跳转到对应标签页）
        function showPaperDetail(paperId) {
            const paper = allPapers.find(p => p.openalex_id === paperId);
            if (paper) {
                switchTab(paper.category === 'PA' ? 'pa' : 'pp');
            }
        }

        // 显示今日论文
        function showTodayPapers() {
            const today = new Date().toISOString().split('T')[0];
            const todayPapers = allPapers.filter(p => p.published_date === today);
            
            if (todayPapers.length === 0) {
                alert('今日暂无新论文');
                return;
            }
            
            switchTab('search');
            document.getElementById('search-results').innerHTML = 
                `<p class="text-gray-500 mb-4">今日更新 ${todayPapers.length} 篇</p>` +
                todayPapers.map(p => renderPaperCard(p)).join('');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            updateFavCount();
            
            // 点击弹窗外部关闭
            document.querySelectorAll('.modal').forEach(modal => {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        this.classList.remove('active');
                    }
                });
            });
        });
    </script>
</body>
</html>
